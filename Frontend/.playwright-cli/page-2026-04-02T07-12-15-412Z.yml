              - heading [level=2]: 软件简介
              - generic:
                - paragraph: 游戏介绍
                - paragraph: 《抢滩登陆战2000(Beach landings 2000)》是由Wizard Works制作的一款射击类游戏，游戏采用的是多年未变的《拯救大兵瑞恩》式抢滩登陆战的场面，玩家不是要攻坚，而是要坚守阵地，防止敌人冲过来。因为场景固定敌人很多炮火漫天所以画面极其火爆，也十分吸引人。
                - heading [level=3]: 游戏秘籍
                - paragraph: 照常进入游戏 之后按F9开启游戏调试控制台
                - paragraph: 输入以下代码即可实现相应效果(已经测试了 通关 加农炮打得叫个爽阿 小日本的飞机像苍蝇一样乱飞 一通猛突突世界安静了 都掉到海里喂海龟了 哈哈)
                - paragraph: 无敌：god (很多朋友都纳闷 set god怎么没用啊?也是 都是秘籍 这个还和其他的不同格式 搞什么飞机?哦 忘了这个就是空战相关的游戏 是要搞几下飞机的 呵呵)
                - paragraph: 弹药修改：set bullet xxxx(随便改数 99999999吧 苍蝇太多 打不过来 哈)
                - paragraph: 修改导弹：set missile xxxxx(小样 叫你跑 放个追踪 跑啊 怎么下来了?呵呵)
                - paragraph: 深水炸弹修改：set dc xxxxx(感觉 意义不大 主要就是防鱼雷)
                - paragraph: 直接过关：destroy all (小日本自己掉下来了 还打个屁阿 不爽 不推荐)
                - paragraph: 读取指定关卡：load levelxx(1-99关任选一个 前面的玩得没意思 选个难得 哈哈 不用一关关过了)
                - paragraph: 游戏里还支持电影效果模式(宽银幕) 按F3 实现 再次按返回。
                - heading [level=3]: 版本说明
                - paragraph: Wizard Works工作室只制作过Beach Head 2000、Beach Head 2002、Beach Head Desert War这三款PC端抢滩登陆战游戏。具体可去http://www.ign.com/companies/wizardworks查看。
                - heading [level=3]: 安装信息
                - paragraph: 1. 解压缩
                - paragraph: 2. 运行游戏
                - paragraph: 注：由于2000资源太过古老，小编一直没找到，用2002的资源，如果玩家手上有2000版本的，可分享出来。
                - paragraph: 游戏打不开请安装3DM游戏运行库合集安装包v2.8：https://dl.3dmgame.com/201608/77290.html
